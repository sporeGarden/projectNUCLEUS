# airSpring — FAO-56 ET₀ validation
# Validates reference evapotranspiration against Python within 1e-5
# airSpring UniBin `validate` subcommand is the canonical entry point

[metadata]
name = "airspring-et0-validation"
description = "FAO-56 reference evapotranspiration — 75/75 Python-Rust cross-validated checks"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/airSpring/target/release/validate_fao56_et0 --format json"
working_dir = "$SPRINGS_ROOT/airSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "process"
