# cargo-deny configuration — darkforest
# Zero C dependencies in application code (ecoBin compliant).

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { crate = "openssl", reason = "Use rustls — no OpenSSL in ecoPrimals" },
    { crate = "openssl-sys", reason = "C binding — use rustls" },
    { crate = "native-tls", reason = "Platform TLS — use rustls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
