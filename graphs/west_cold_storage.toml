#
# Deploy Graph: west_cold_storage — westGate
#
# i7-4771 (4c/8t), 32 GB DDR3, RTX 2070 Super (8 GB).
# 76 TB ZFS pool (HDD) + 2 TB NVMe cache tier.
# 10G NIC installed (pending cable activation).
#
# Composition: Nest Atomic — Tower + NestGate + Provenance Trio.
# NestGate CAS primary: the sovereign cluster's cold storage archive.
# ZFS-backed content-addressed store with instant snapshots.
#
# Fragment: nest_atomic (neutron particle)
# Canonical ports: deploy/nucleus-primals/src/lib.rs
#
# westGate's role is data at rest. Low CPU (65W), always-on, high
# capacity. All science springs archive datasets here. sporePrint
# content source-of-truth lives on this gate's NestGate instance.
#
# Wave 73: gate-specific graph.
#
# Usage:
#   nucleus-deploy deploy --gate westgate --graph graphs/west_cold_storage.toml

[graph]
name = "west_cold_storage"
version = "1.0.0"
gate = "westgate"
atomic = "nest_atomic"
description = "Nest Atomic — Tower + NestGate CAS + Provenance Trio — 76 TB ZFS cold storage"
coordination = "sequential"
bonding_default = "btsp_required"

[graph.metadata]
security_model = "btsp_enforced"
secure_by_default = true
transport = "uds_preferred"
tcp_fallback = "tower_routed"
composition_model = "nucleated"
fragments = ["tower_atomic", "nest_atomic"]

[graph.hardware]
cpu = "Intel i7-4771"
cores = 4
threads = 8
ram_gb = 32
storage_hdd_tb = 76.0
storage_nvme_tb = 2.0
zfs = true

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Tower Atomic (order 1–3) ───────────────────────────────────────

[primals.beardog]
binary = "beardog"
port = 9100
health_method = "health.liveness"
required = true
role = "BTSP authentication + method gating"
start_order = 1
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash", "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair"]

[primals.songbird]
binary = "songbird"
port = 9200
health_method = "health.liveness"
required = true
role = "Mesh discovery + relay"
depends_on = ["beardog"]
start_order = 2
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "ipc.discover", "discovery.peers", "discovery.announce"]

[primals.skunkbat]
binary = "skunkbat"
port = 9140
health_method = "health.liveness"
required = true
role = "Reconnaissance + automated defense"
depends_on = ["beardog"]
start_order = 3
by_capability = "defense"
capabilities = ["defense.audit", "defense.status", "security.audit_log", "recon.scan", "threat.assess"]

# ── NestGate CAS (order 4) ────────────────────────────────────────

[primals.nestgate]
binary = "nestgate"
port = 9500
health_method = "health.liveness"
required = true
role = "Content-addressed storage — ZFS-backed cold archive"
depends_on = ["beardog", "songbird"]
start_order = 4
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists", "storage.delete", "storage.fetch_external"]

# ── Provenance Trio (order 5–7) ────────────────────────────────────

[primals.rhizocrypt]
binary = "rhizocrypt"
port = 9601
health_method = "health.liveness"
required = false
role = "Ephemeral DAG engine — lineage tracking"
depends_on = ["beardog"]
start_order = 5
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.proof"]

[primals.loamspine]
binary = "loamspine"
port = 9700
health_method = "health.liveness"
required = false
role = "Permanent ledger — sealed provenance entries"
depends_on = ["beardog", "rhizocrypt"]
start_order = 6
by_capability = "ledger"
capabilities = ["spine.create", "spine.get", "spine.seal", "entry.append", "certificate.mint"]

[primals.sweetgrass]
binary = "sweetgrass"
port = 9850
health_method = "health.liveness"
required = false
role = "Semantic attribution — braid composition"
depends_on = ["beardog", "loamspine"]
start_order = 7
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "braid.get", "anchoring.anchor", "anchoring.verify"]

# ── Storage Role ───────────────────────────────────────────────────

[storage]
role = "cold_archive"
zfs_pool = true
snapshot_capable = true
replication_target = true
content_source_of_truth = ["sporePrint"]
datasets = [
    "NCBI FASTQs (5+ GB per file)",
    "Genome databases (RefSeq, UniProt, KEGG)",
    "LTEE dataset archival (lithoSpore)",
    "provenance artifacts (sweetGrass braids)",
]
