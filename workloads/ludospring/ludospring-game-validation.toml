# ludoSpring — game math + procedural generation validation
# Validates Tier 1 structural scenarios via UniBin validate subcommand
# 28 game.* methods registered in canonical registry (415 total)
# V67: --format json for Tier 2 toadstool.validate integration

[metadata]
name = "ludospring-game-validation"
description = "Game math validation — procedural gen, raycasting, engagement metrics, Python parity"
version = "0.2.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/ludoSpring/target/release/ludospring validate --format json"
working_dir = "$SPRINGS_ROOT/ludoSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "None"
