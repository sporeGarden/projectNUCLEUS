# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration — nucleus-deploy
# Pure Rust deployment tool. Zero C/TLS dependencies.

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
    { crate = "openssl", reason = "Use rustls — no OpenSSL in ecoPrimals" },
    { crate = "openssl-sys", reason = "C binding — use rustls" },
    { crate = "native-tls", reason = "Platform TLS — use rustls" },
    { crate = "unsafe-libyaml", reason = "C YAML parser — use serde-saphyr (pure Rust)" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
