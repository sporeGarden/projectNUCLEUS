# hotSpring — Sarkas Yukawa MD validation
# Validates paper-parity molecular dynamics on consumer GPU
# hotSpring UniBin `validate` subcommand is the canonical entry point

[metadata]
name = "hotspring-md-validation"
description = "Sarkas Yukawa OCP molecular dynamics — paper parity, 0.000% energy drift"
version = "0.2.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/hotSpring/barracuda/target/release/hotspring_unibin"
args = ["validate", "--scenario", "sarkas_yukawa_md"]
working_dir = "$SPRINGS_ROOT/hotSpring"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 90.0

[security]
isolation_level = "None"
