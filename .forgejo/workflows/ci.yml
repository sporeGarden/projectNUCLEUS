# Forgejo Actions CI — projectNUCLEUS
#
# PRIMARY CI since Wave 69. Runs fmt, clippy, test on all Rust crates.
# Toolchain pinned via rust-toolchain.toml at repo root.
#
# Runner: self-hosted when available, falls back to ubuntu-latest.
# Self-hosted label: `self-hosted, linux, x86_64, rust`
#
# GitHub Actions shadow: only notify-sporeprint.yml remains on GitHub
# (postprimordial — archive when Forgejo webhook validated on VPS).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          if [ -f rust-toolchain.toml ]; then
            channel=$(grep 'channel' rust-toolchain.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            rustup toolchain install "$channel" --profile minimal --component rustfmt,clippy
            rustup default "$channel"
          fi
          rustc --version
          cargo --version

      - name: darkforest — fmt + clippy + test
        working-directory: validation/darkforest
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: tunnelKeeper — fmt + clippy + test
        working-directory: validation/tunnelKeeper
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: nucleus-deploy — fmt + clippy + test
        working-directory: deploy/nucleus-deploy
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test

      - name: Shell script syntax check
        run: |
          fail=0
          for script in deploy/*.sh; do
            if ! bash -n "$script" 2>/dev/null; then
              echo "FAIL: $script"
              fail=$((fail + 1))
            fi
          done
          echo "Checked $(ls deploy/*.sh | wc -l) scripts, $fail failures"
          exit $fail
