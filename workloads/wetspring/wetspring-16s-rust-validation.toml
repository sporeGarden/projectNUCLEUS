# wetSpring 16S Rust validation — dispatched through toadStool
# Validates the Rust 16S pipeline against Python baseline results

[metadata]
name = "wetspring-16s-rust-validation"
description = "Rust 16S pipeline validation (FASTQ QC, derep, taxonomy, UniFrac) — parity check vs Python baseline"
version = "0.1.0"

[execution]
type = "native"
# Set WETSPRING_DIR to your springs/wetSpring checkout before running
command = "${WETSPRING_DIR}/target/release/validate_16s_pipeline"
working_dir = "${WETSPRING_DIR}"

[resources]
max_memory_bytes = 2147483648
max_cpu_percent = 80.0

[security]
isolation_level = "None"
