# wetSpring 16S Python baseline — ground truth for Rust parity
# Runs pure-Python 16S pipeline on public BioProject FASTQ data
# Requires: numpy, scipy (available in bioinfo conda env)

[metadata]
name = "wetspring-16s-python-baseline"
description = "16S Python baseline on PRJNA488170/PRJNA382322 public data — ground truth for Rust comparison"
version = "0.1.0"

[execution]
type = "native"
command = "$GATE_HOME/miniforge3/envs/bioinfo/bin/python3"
args = ["$SPRINGS_ROOT/wetSpring/scripts/validate_public_16s_python.py", "--format", "json"]
working_dir = "$SPRINGS_ROOT/wetSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 2147483648
max_cpu_percent = 50.0

[security]
isolation_level = "None"
