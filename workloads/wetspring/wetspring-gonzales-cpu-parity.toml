# wetSpring Gonzales PK/dose-response CPU parity validation
# Immunological modeling (IC50, IL-31, PK) — Paper 12 Anderson lineage

[metadata]
name = "wetspring-gonzales-cpu-parity"
description = "Gonzales CPU parity — PK/dose-response immunological modeling against Python baselines"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/wetSpring/target/release/validate_gonzales_cpu_parity"
working_dir = "$SPRINGS_ROOT/wetSpring"

[resources]
max_memory_bytes = 1073741824
max_cpu_percent = 80.0

[security]
isolation_level = "None"
