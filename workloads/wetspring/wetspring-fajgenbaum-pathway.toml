# wetSpring Fajgenbaum Pathway Scoring — PI3K/AKT/mTOR → Sirolimus
# Reproduces computational drug-pathway matching from Fajgenbaum et al.
# JCI 2019 (doi:10.1172/JCI126091). Identifies PI3K/AKT/mTOR as the
# pathogenic pathway in IL-6-blockade-refractory iMCD and matches it
# to sirolimus (rapamycin).
# Self-contained — uses published pathway activation scores from JCI 2019 Fig 3.

[metadata]
name = "wetspring-fajgenbaum-pathway"
description = "Fajgenbaum JCI 2019 pathway scoring — drug repurposing via published proteomic data"
version = "0.1.0"

[execution]
type = "native"
command = "/home/irongate/Development/ecoPrimals/springs/wetSpring/target/release/validate_fajgenbaum_pathway"
working_dir = "/home/irongate/Development/ecoPrimals/springs/wetSpring"

[resources]
max_memory_bytes = 536870912
max_cpu_percent = 30.0

[security]
isolation_level = "None"
