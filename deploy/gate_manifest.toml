# Gate Manifest — projectNUCLEUS
#
# Maps gates to their atomic compositions and roles.
# nucleus-deploy reads this to determine what to start on each gate.
#
# Add a gate: create a gates/<name>.toml and add an entry here.
# All 8 gates in the ironGate sovereign cluster are listed.

[manifest]
version = "0.3.0"
bonding_default = "covalent"
btsp_phase = 3
wire_standard = "L3"

[[gates]]
name = "irongate"
atomic = "nest+toadstool"
config = "../gates/irongate.toml"
status = "active"
primals = 13
composition = "nest_atomic + node_atomic_compute"
graph = "../graphs/nucleus_complete.toml"

[[gates]]
name = "biomegate"
atomic = "heavy_node"
config = "../gates/biomegate.toml"
status = "offline"
offline_since = "2026-06-02"
offline_reason = "recovery — no deployments during biomeGate recovery (Wave 71)"
primals = 6
composition = "heavy_node_atomic + hbm2_bench"
graph = "../graphs/node_atomic.toml"

[[gates]]
name = "strandgate"
atomic = "heavy_node_atomic"
config = "../gates/strandgate.toml"
status = "active"
primals = 10
composition = "tower_atomic + node_atomic + nest_atomic (dual_vendor_gpu)"
graph = "../graphs/strand_heavy_compute.toml"

[[gates]]
name = "flockgate"
atomic = "node_atomic"
config = "../gates/flockgate.toml"
status = "active"
primals = 6
composition = "node_atomic_compute"
graph = "../graphs/node_atomic.toml"

[[gates]]
name = "northgate"
atomic = "node_atomic"
config = "../gates/northgate.toml"
status = "active"
primals = 6
composition = "node_atomic_compute"
graph = "../graphs/node_atomic.toml"

[[gates]]
name = "westgate"
atomic = "nest_atomic"
config = "../gates/westgate.toml"
status = "onboarding"
primals = 7
composition = "nest_atomic (ZFS cold storage)"
graph = "../graphs/west_cold_storage.toml"

[[gates]]
name = "graphenegate"
atomic = "tower"
config = "../gates/graphenegate.toml"
status = "planned"
primals = 3
composition = "tower_atomic (portable_anchor)"
graph = "../graphs/graphene_portable.toml"
gate_class = "portable_anchor"

[[gates]]
name = "nuc-intake"
atomic = "tower"
config = "../gates/nuc-intake.toml"
status = "planned"
primals = 3
composition = "tower_atomic"
graph = "../graphs/tower_atomic.toml"
