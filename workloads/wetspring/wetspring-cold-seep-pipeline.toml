# wetSpring Cold Seep Pipeline (Exp185)
# Cold seep metagenomics — QS gene catalog, diversity analysis.
# Part of the 170 cold seep metagenome / 299K QS gene body of work.

[metadata]
name = "wetspring-cold-seep-pipeline"
description = "Cold seep metagenomics pipeline — QS gene catalog and diversity analysis"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/wetSpring/target/release/validate_cold_seep_pipeline"
working_dir = "$SPRINGS_ROOT/wetSpring"

[resources]
max_memory_bytes = 2147483648
max_cpu_percent = 80.0

[security]
isolation_level = "None"
