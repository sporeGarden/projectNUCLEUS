# healthSpring — guideStone certification
# Runs full certification (57/57 checks, Level 5) via UniBin certify
# Pre-deployment gate: if certification fails, primal should not deploy

[metadata]
name = "healthspring-certification"
description = "guideStone certification — 57/57 Tier 1-3 checks, BLAKE3 manifest, composition parity"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/healthSpring/target/release/healthspring certify"
working_dir = "$SPRINGS_ROOT/healthSpring"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "None"
