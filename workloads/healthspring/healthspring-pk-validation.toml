# healthSpring — PK/PD model validation
# Validates pharmacokinetic models with Python cross-validation
# healthSpring UniBin `validate` subcommand is the canonical entry point

[metadata]
name = "healthspring-pk-validation"
description = "Pharmacokinetic model validation — Hill, PBPK, population Monte Carlo, Michaelis-Menten"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/healthSpring/target/release/healthspring validate --format json"
working_dir = "$SPRINGS_ROOT/healthSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "None"
