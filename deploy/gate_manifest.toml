# Gate Manifest — projectNUCLEUS
#
# Maps gates to their atomic compositions and roles.
# deploy.sh reads this to determine what to start on each gate.
#
# Add a gate: create a gates/<name>.toml and add an entry here.

[manifest]
version = "0.2.0"
bonding_default = "covalent"
btsp_phase = 3
wire_standard = "L3"

[[gates]]
name = "irongate"
atomic = "nest+node"
config = "../gates/irongate.toml"
status = "active"
primals = 9
composition = "nest_atomic + node_atomic_compute"
graph = "../graphs/nucleus_complete.toml"

[[gates]]
name = "nuc-intake"
atomic = "tower"
config = "../gates/nuc-intake.toml"
status = "planned"
