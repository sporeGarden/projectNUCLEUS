# Source of truth: primalSpring/graphs/ (validation/structural format with metadata/fragments/bonding)
# Runtime execution variant: biomeOS/graphs/nucleus_complete.toml
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Full NUCLEUS Complete — Zero-Port Tower Atomic Standard
#
# 13 primals discovered from plasmidBin + primalSpring coordination validator.
# Domain: BearDog, Songbird, ToadStool, BarraCuda, CoralReef, NestGate,
#         Squirrel, rhizoCrypt, loamSpine, sweetGrass, skunkBat.
# Meta:   biomeOS (orchestrator), petalTongue (UI), primalSpring (coordination).
# Future: sourDough (scaffolding — starter culture for new primals, no binary yet).
#
# Zero TCP ports bound by default. All IPC over Unix domain sockets.
# TCP fallback ports declared per node for Tier 5 discovery.
#
# Security model:
#   All primals: BTSP Phase 3 AEAD (13/13 converged Phase 59)
#   Tower boundary (BearDog + Songbird): BTSP enforced, ChaCha20-Poly1305
#   NUCLEUS internal (same-host UDS): BTSP authenticated, HMAC-plain cipher
#   External federation: opt-in Songbird TCP with full encryption
#
# Wire Standard: L3 — `protocol` + `transport` on `capabilities.list`
# Discovery: 5-tier escalation (Songbird IPC → biomeOS Neural → UDS → registry → TCP)
#
# This is the canonical reference graph for downstream springs.
# Also serves as the primalSpring coordination niche deployment
# (consolidates former primalspring_deploy.toml).
#
# Usage:
#   biomeos deploy --graph graphs/nucleus_complete.toml

[graph]
name = "nucleus_complete"
description = "Full NUCLEUS: biomeOS + Tower + Core Services + Provenance Trio + primalSpring"
version = "2.0.0"
coordination = "sequential"
bonding_policy = "btsp_required"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "nucleated"
fragments = ["tower_atomic", "nucleus", "nest_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "metallic"
tower_to_external = "ionic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "btsp_authenticated"
encryption_tiers.federation = "full"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API — orchestration substrate
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
tcp_fallback_port = 9800
capabilities = [
    "graph.deploy",
    "graph.status",
    "graph.rollback",
    "capability.discover",
    "capability.route",
    "federation.configure",
    "federation.join",
]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic — BTSP enforced security perimeter
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
tcp_fallback_port = 9100
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
tcp_fallback_port = 9200
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Core Services — BTSP authenticated via BearDog relay
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "btsp"
tcp_fallback_port = 9400
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "btsp"
tcp_fallback_port = 9740
capabilities = [
    "tensor.create", "tensor.matmul", "tensor.add",
    "tensor.batch.submit", "math.matvec", "math.cholesky",
]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "btsp"
tcp_fallback_port = 9730
capabilities = ["shader.compile.wgsl", "shader.dispatch"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "btsp"
tcp_fallback_port = 9500
capabilities = [
    "storage.store", "storage.retrieve",
    "storage.store_blob", "storage.retrieve_blob",
    "storage.retrieve_range", "storage.object.size",
    "storage.namespaces.list",
]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 7
required = true
depends_on = ["beardog", "songbird", "toadstool", "nestgate"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "btsp"
tcp_fallback_port = 9300
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 3: Provenance Trio — BTSP authenticated via BearDog relay
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "btsp"
tcp_fallback_port = 9601
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "btsp"
tcp_fallback_port = 9700
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "btsp"
tcp_fallback_port = 9850
capabilities = [
    "provenance.create_braid", "provenance.lineage",
    "provenance.graph",
]

# ═══════════════════════════════════════════════════════════════
# Phase 3b: Defense — metadata-only threat detection
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "skunkbat"
binary = "skunkbat"
order = 10
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "defense"
security_model = "btsp"
tcp_fallback_port = 9140
capabilities = [
    "defense.scan", "defense.detect",
    "defense.baseline", "defense.health",
]

# ═══════════════════════════════════════════════════════════════
# Phase 4: Interface — BTSP authenticated via BearDog relay
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "btsp"
tcp_fallback_port = 9900
args = ["server"]
capabilities = [
    "visualization.render", "visualization.render.scene",
    "visualization.render.stream", "visualization.render.dashboard",
    "visualization.render.grammar", "visualization.export",
    "visualization.session.list",
    "interaction.subscribe", "interaction.poll",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Coordination validator
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "primalspring"
binary = "primalspring_primal"
order = 12
required = true
spawn = false
depends_on = ["biomeos_neural_api", "beardog", "songbird", "nestgate", "toadstool", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
    "coordination.deploy_atomic",
    "composition.nucleus_health",
    "nucleus.start", "nucleus.stop",
]
