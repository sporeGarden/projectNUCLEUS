# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration — nucleus-primals
# Zero-dependency registry crate. Pure Rust, no external deps.

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { crate = "openssl", reason = "No OpenSSL in ecoPrimals" },
    { crate = "openssl-sys", reason = "No C bindings" },
    { crate = "native-tls", reason = "No platform TLS" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
