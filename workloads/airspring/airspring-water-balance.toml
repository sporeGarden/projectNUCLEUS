# airSpring — FAO-56 water balance
# Daily soil water balance, dual crop coefficient, Stewart yield response

[metadata]
name = "airspring-water-balance"
description = "FAO-56 daily soil water balance, dual crop coefficient, and Stewart yield response"
version = "0.1.0"

[execution]
type = "native"
command = "${SPRINGS_ROOT:-/home/eastgate/Development/ecoPrimals/springs}/airSpring/target/release/validate_water_balance"
