# wetSpring Real NCBI Sovereign Pipeline (Exp184)
# Downloads real 16S sequences from NCBI (cold seep PRJNA315684, vent
# PRJNA283159), processes through diversity + Anderson spectral pipeline.
# Falls back to synthetic communities when offline or without NCBI API key.

[metadata]
name = "wetspring-real-ncbi-pipeline"
description = "Real NCBI 16S through sovereign diversity + Anderson spectral pipeline (Exp184)"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/wetSpring/target/release/validate_real_ncbi_pipeline --format json"
working_dir = "$SPRINGS_ROOT/wetSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 2147483648
max_cpu_percent = 80.0

[security]
isolation_level = "None"
