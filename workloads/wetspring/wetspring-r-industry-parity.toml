# wetSpring R Industry Parity — vegan / DADA2 / phyloseq
# Validates Rust implementations against R gold-standard packages:
#   vegan 2.7.3 (alpha/beta diversity, rarefaction, PCoA)
#   dada2 1.22.0 (error model, Phred, abundance)
#   phyloseq 1.38.0 (UniFrac, cophenetic distances)
# Self-contained — uses synthetic test vectors, no external data needed.

[metadata]
name = "wetspring-r-industry-parity"
description = "R vegan/DADA2/phyloseq gold-standard parity validation"
version = "0.1.0"

[execution]
type = "native"
command = "$SPRINGS_ROOT/wetSpring/target/release/validate_r_industry_parity --format json"
working_dir = "$SPRINGS_ROOT/wetSpring"

[output]
format = "json"
schema = "toadstool-validate-v1"

[resources]
max_memory_bytes = 1073741824
max_cpu_percent = 50.0

[security]
isolation_level = "None"
